<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8">

  <title>Brain Rush Online</title>

  <link
    rel="icon"
    href="Favicon.jpeg"
  >

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

<div id="menu">

  <h1>Brain Rush Online</h1>

  <p>
    Проверь свои знания
    в онлайн викторине
  </p>

  <input
    id="nick"
    placeholder="Введите ник"
  >

  <br>

  <button onclick="findGame()">
    Найти соперника
  </button>

  <div id="status"></div>

</div>

<div id="game" style="display:none">

  <button
    id="menuBtn"
    onclick="goMenu()"
  >
    На главную
  </button>

  <div id="questionNumber"></div>

  <div id="topBar">

    <div id="player1"></div>

    <div id="player2"></div>

  </div>

  <div id="question"></div>

  <div id="answers"></div>

  <div id="waitingText"></div>

  <div id="result"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="client.js"></script>

</body>
</html>
